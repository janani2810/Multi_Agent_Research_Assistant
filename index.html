<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Research Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container { max-width: 900px; width: 100%; }

        .header { text-align: center; color: white; margin-bottom: 30px; animation: slideDown 0.6s ease; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p  { font-size: 1.1em; opacity: 0.9; }

        .card {
            background: white; border-radius: 15px; padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: slideUp 0.6s ease;
        }

        .hidden { display: none !important; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .input-group input[type="text"] {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 1em; transition: border-color 0.3s;
        }
        .input-group input[type="text"]:focus { outline: none; border-color: #667eea; box-shadow: 0 0 10px rgba(102,126,234,0.2); }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .checkbox-group label { margin: 0; font-size: 0.95em; cursor: pointer; }

        button {
            padding: 14px 30px; border: none; border-radius: 8px;
            font-size: 1.05em; font-weight: 600; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-primary   { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 100%; }
        .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .btn-secondary { background: #f0f0f0; color: #333; border: 2px solid #ddd; }
        .btn-secondary:hover { background: #e8e8e8; }
        .btn-success   { background: #10b981; color: white; }
        .btn-success:hover  { background: #059669; transform: translateY(-2px); }
        .btn-disabled  { background: #ccc !important; color: #888 !important; cursor: not-allowed !important; transform: none !important; }

        .progress-container { margin-bottom: 30px; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .progress-percent { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .progress-bar { width: 100%; height: 30px; background: #e0e0e0; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%; transition: width 0.5s ease;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 0.9em;
        }
        .status-text { text-align: center; color: #888; font-size: 0.85em; font-style: italic; margin-bottom: 20px; }

        .phases-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .phase { padding: 15px; border-radius: 10px; text-align: center; background: #f5f5f5; transition: all 0.3s; border: 2px solid #e0e0e0; }
        .phase.active    { background: #fff3cd; border-color: #ffc107; transform: scale(1.05); }
        .phase.completed { background: #d4edda; border-color: #28a745; }
        .phase-icon  { font-size: 1.8em; margin-bottom: 8px; }
        .phase-label { font-size: 0.85em; font-weight: 600; color: #333; }

        .quality-score {
            text-align: center; margin-bottom: 30px; padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px; color: white;
        }
        .score-number { font-size: 3em; font-weight: bold; margin-bottom: 10px; }
        .score-label  { font-size: 1.2em; opacity: 0.9; }

        .report-preview {
            background: #f9f9f9; border-radius: 10px; padding: 20px; margin-bottom: 20px;
            max-height: 400px; overflow-y: auto; border-left: 4px solid #667eea;
        }
        .report-preview h3 { margin-bottom: 15px; color: #333; }

        .download-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .error-message { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .card { padding: 25px; }
            .phases-container { grid-template-columns: repeat(2, 1fr); }
            .download-group   { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔬 Research Assistant</h1>
        <p>AI-Powered Autonomous Research System</p>
    </div>

    <div class="card">

        <!-- Input -->
        <div id="inputCard">
            <h2 style="margin-bottom:25px;color:#333;">Start New Research</h2>
            <div class="input-group">
                <label for="topic">Research Topic</label>
                <input type="text" id="topic"
                    placeholder="e.g., AI in healthcare, Climate solutions, Quantum computing..."
                    onkeypress="if(event.key==='Enter') startResearch()">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="autoApprove" checked>
                <label for="autoApprove">Auto-approve (skip manual review)</label>
            </div>
            <button class="btn-primary" onclick="startResearch()">🚀 Start Research</button>
            <div style="margin-top:20px;padding-top:20px;border-top:1px solid #e0e0e0;text-align:center;color:#666;font-size:0.9em;">
                <p>⏱️ Typical time: 2–3 minutes &nbsp;|&nbsp; 📊 PDF + Markdown &nbsp;|&nbsp; ⭐ Quality score 0–100</p>
            </div>
        </div>

        <!-- Progress -->
        <div id="progressCard" class="hidden">
            <h2 style="margin-bottom:25px;color:#333;">Research In Progress...</h2>
            <div class="progress-container">
                <div class="progress-header">
                    <span>Overall Progress</span>
                    <span class="progress-percent"><span id="progressPercent">0</span>%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="status-text" id="statusText">Starting up…</p>
            </div>
            <div class="phases-container" id="phasesContainer"></div>
            <div style="text-align:center;color:#999;font-size:0.85em;">🔄 Updating every 2 seconds…</div>
        </div>

        <!-- Results -->
        <div id="resultsCard" class="hidden">
            <h2 style="margin-bottom:25px;color:#333;">✅ Research Complete!</h2>
            <div class="quality-score">
                <div class="score-number" id="qualityScore">—</div>
                <div class="score-label"  id="qualityLabel">Quality Score</div>
            </div>
            <div class="report-preview" id="reportPreview"></div>
            <div class="download-group">
                <button class="btn-success" id="btnPDF"      onclick="downloadPDF()">📥 Download PDF</button>
                <button class="btn-success" id="btnMarkdown" onclick="downloadMarkdown()">📥 Download Markdown</button>
            </div>
            <button class="btn-secondary" onclick="resetForm()" style="width:100%;">🔄 Start New Research</button>
        </div>

        <!-- Error -->
        <div id="errorCard" class="hidden">
            <div class="error-message" id="errorMessage"></div>
            <button class="btn-secondary" onclick="resetForm()" style="width:100%;">🔄 Try Again</button>
        </div>

    </div>
</div>

<script>
    const API_BASE = 'http://127.0.0.1:8000';
    let currentSessionId = null;
    let pollInterval     = null;
    let reportCache      = null;  // fetched once, reused for markdown download

    const PHASES = [
        { label: '🔍 Research', threshold: 25 },
        { label: '📊 Analysis', threshold: 50 },
        { label: '✍️ Writing',  threshold: 75 },
        { label: '⭐ Review',   threshold: 100 },
    ];

    // ── Start ──────────────────────────────────────────────────────────────
    async function startResearch() {
        const topic = document.getElementById('topic').value.trim();
        if (!topic || topic.length < 3) { alert('Please enter a topic (at least 3 characters)'); return; }

        reportCache = null;
        hideAllCards(); showProgressCard();
        updateProgressBar(0, 'Starting…');

        try {
            const res = await fetch(`${API_BASE}/research/start`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic, auto_approve: document.getElementById('autoApprove').checked })
            });
            if (!res.ok) throw new Error('Server returned ' + res.status);
            const data = await res.json();
            currentSessionId = data.session_id;
            startPolling();
        } catch (err) {
            showError('Could not start research: ' + err.message);
            hideAllCards(); showInputCard();
        }
    }

    // ── Polling ────────────────────────────────────────────────────────────
    function startPolling() {
        let ticks = 0;
        const MAX = 180;  // 6 minutes max

        pollInterval = setInterval(async () => {
            ticks++;
            if (ticks > MAX) { stopPolling(); showError('Research timed out. Please try again.'); return; }

            try {
                const res = await fetch(`${API_BASE}/research/status/${currentSessionId}`);
                if (!res.ok) return;
                const data = await res.json();

                updateProgressBar(data.progress ?? 0, data.status ?? '');

                if (data.status === 'Completed') {
                    stopPolling();
                    await loadAndShowResults();
                } else if (data.status === 'Error') {
                    stopPolling();
                    showError('Research failed: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                console.warn('Poll error (will retry):', err);
            }
        }, 2000);
    }

    function stopPolling() {
        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // ── Load report ONCE then render ───────────────────────────────────────
    async function loadAndShowResults() {
        try {
            const res = await fetch(`${API_BASE}/research/report/${currentSessionId}`);
            if (!res.ok) throw new Error('Report endpoint returned ' + res.status);
            reportCache = await res.json();
            renderResults(reportCache);
        } catch (err) {
            showError('Could not load report: ' + err.message);
        }
    }

    function renderResults(report) {
        const score = report.quality_score ?? 70;
        document.getElementById('qualityScore').textContent = score;
        document.getElementById('qualityLabel').textContent =
            score >= 80 ? 'Excellent' : score >= 60 ? 'Good' : 'Fair — consider improvements';

        const preview = (report.markdown || '').slice(0, 1200);
        document.getElementById('reportPreview').innerHTML =
            `<h3>${report.title}</h3>
             <pre style="white-space:pre-wrap;word-wrap:break-word;color:#555;font-size:0.88em;">${preview}…</pre>`;

        hideAllCards(); showResultsCard();
    }

    // ── Progress UI ────────────────────────────────────────────────────────
    function updateProgressBar(progress, statusLabel) {
        document.getElementById('progressPercent').textContent = progress;
        const fill = document.getElementById('progressFill');
        fill.style.width = progress + '%';
        fill.textContent = progress > 12 ? progress + '%' : '';
        document.getElementById('statusText').textContent = statusLabel ? 'Phase: ' + statusLabel : '';
        renderPhases(progress);
    }

    function renderPhases(progress) {
        const prevThresholds = [0, 25, 50, 75];
        document.getElementById('phasesContainer').innerHTML =
            PHASES.map((p, i) => {
                let cls = 'phase', icon = '⭕';
                if (progress >= p.threshold)             { cls += ' completed'; icon = '✅'; }
                else if (progress > prevThresholds[i])   { cls += ' active';    icon = '⏳'; }
                return `<div class="${cls}"><div class="phase-icon">${icon}</div><div class="phase-label">${p.label}</div></div>`;
            }).join('');
    }

    // ── PDF Download ───────────────────────────────────────────────────────
    async function downloadPDF() {
        const btn = document.getElementById('btnPDF');
        btn.textContent = '⏳ Generating…';
        btn.classList.add('btn-disabled');
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE}/research/download/${currentSessionId}`);
            if (!res.ok) throw new Error('Server returned ' + res.status);
            const blob = await res.blob();
            triggerDownload(blob, `research_${currentSessionId}.pdf`);
        } catch (err) {
            alert('PDF download failed: ' + err.message);
        } finally {
            btn.textContent = '📥 Download PDF';
            btn.classList.remove('btn-disabled');
            btn.disabled = false;
        }
    }

    // ── Markdown Download (uses cached report — no extra network call) ─────
    function downloadMarkdown() {
        if (!reportCache) { alert('Report not loaded yet. Please wait.'); return; }
        const blob = new Blob([reportCache.markdown], { type: 'text/markdown' });
        triggerDownload(blob, `research_${currentSessionId}.md`);
    }

    function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // ── UI helpers ─────────────────────────────────────────────────────────
    function hideAllCards() {
        ['inputCard','progressCard','resultsCard','errorCard']
            .forEach(id => document.getElementById(id).classList.add('hidden'));
    }
    function showInputCard()    { document.getElementById('inputCard').classList.remove('hidden'); }
    function showProgressCard() { document.getElementById('progressCard').classList.remove('hidden'); }
    function showResultsCard()  { document.getElementById('resultsCard').classList.remove('hidden'); }

    function showError(msg) {
        stopPolling();
        hideAllCards();
        document.getElementById('errorMessage').textContent = msg;
        document.getElementById('errorCard').classList.remove('hidden');
    }

    function resetForm() {
        stopPolling();
        currentSessionId = null;
        reportCache      = null;
        hideAllCards(); showInputCard();
        document.getElementById('topic').value = '';
        document.getElementById('topic').focus();
    }

    window.addEventListener('load', () => document.getElementById('topic').focus());
</script>
</body>
</html>
